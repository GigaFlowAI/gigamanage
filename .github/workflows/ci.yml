name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # `gm grep` shells out to ripgrep, and the search tests exercise it for
      # real rather than mocking it. Not preinstalled on the runner.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      # The architecture rule is enforced, not merely documented.
      - name: Check layer boundaries
        run: npm run check:layers

      - name: Typecheck
        run: npm run check:types

      # No test calls a real model or reads a real home directory.
      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build
