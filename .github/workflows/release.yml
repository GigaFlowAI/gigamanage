name: Release

# Publishes to npm when a v* tag is pushed, e.g.:
#   npm version minor && git push --follow-tags
#
# Publishing happens here rather than from a laptop so that every release is
# built from a known commit by a known workflow, and npm records a provenance
# attestation saying so. Requires an NPM_TOKEN secret (an npm automation token).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # The search tests spawn real ripgrep; it is not on the runner by default.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      # Never publish something that does not pass its own checks.
      - name: Check
        run: npm run check

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
